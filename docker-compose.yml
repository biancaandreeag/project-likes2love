
services:
  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: my-cluster-id
    networks:
      - kafka-net
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10


  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./backup:/backup              
      - ./backup:/data/dump  
    networks:
      - kafka-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend-api:
    build: ./server-API
    ports:
      - "8000:8000"
    depends_on:
      broker:
        condition: service_healthy
      mongo:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      MONGO_URI: mongodb://mongo:27017/posts_db
    volumes:
      - ./shared_logs:/shared_logs
      - ./shared_utils:/app/shared_utils
    networks:
      - kafka-net

  preprocessor:
    build: ./realtime-process
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
    volumes:
      - ./shared_logs:/shared_logs
      - ./shared_utils:/app/shared_utils
    networks:
      - kafka-net
    restart: always

  scraper:
    build: ./scrapers
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
    volumes:
      - ./shared_logs:/shared_logs
      - ./shared_utils:/app/shared_utils
    networks:
      - kafka-net
    restart: always

  module-ai:
    build: ./AI-module
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
    volumes:
      - ./shared_logs:/shared_logs
      - ./shared_utils:/app/shared_utils
    networks:
      - kafka-net
    restart: always

volumes:
  mongo-data:
  
networks:
  kafka-net:
    driver: bridge
